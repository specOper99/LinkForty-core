# UI-only compose — expects Core already reachable at CORE_URL.
#
# If Core runs in a separate compose project, create a shared network once:
#   docker network create linkforty_shared
# Attach that network on Core's compose and set CORE_URL=http://linkforty:3000.
#
# For Coolify (Core + dashboard together), use root docker-compose.coolify.yml
# instead of this file.

services:
  dashboard:
    build: .
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    environment:
      CORE_URL: ${CORE_URL:-http://linkforty:3000}
      SHORTLINK_BASE_URL: ${SHORTLINK_BASE_URL:-}
      CORE_API_TOKEN: ${CORE_API_TOKEN:-}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3001}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      OPERATOR_USER_ID: ${OPERATOR_USER_ID}
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
    networks:
      - default
      - shared
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  shared:
    external: true
    name: ${COMPOSE_SHARED_NETWORK:-linkforty_shared}
