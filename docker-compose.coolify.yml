# Single Coolify resource: Postgres + Redis + Core + Dashboard.
# All four share the default project network → CORE_URL=http://linkforty:3000.
#
# Coolify UI:
#   Resource type: Docker Compose
#   Compose file: docker-compose.coolify.yml
#   Domains:
#     linkforty  → https://links.example.com:3000
#     dashboard  → https://dashboard.example.com:3001
#   AUTH_URL = https://dashboard.example.com  (no :3001)
#   SHORTLINK_BASE_URL = https://links.example.com
#   POSTGRES_PASSWORD: alphanumeric; wipe volume after any password/user change
#   Leave DATABASE_URL unset in Coolify UI (compose uses PGHOST + POSTGRES_*)
#   ADMIN_PASSWORD_HASH_B64: base64(bcrypt) — not raw $2b$… (see COOLIFY.md)
#   Secrets + NODE_ENV: Runtime only in Coolify UI (uncheck Available at Buildtime)
#
# Networks:
#   - postgres/redis: default only (DB must share default with Core)
#   - linkforty/dashboard: default + coolify (Traefik)
#   - coolify name is HARDCODED — do not use ${COOLIFY_NETWORK}; Coolify injects
#     that as the resource UUID and then fails with "network UUID external not found"
#
# See COOLIFY.md for setup.

services:
  postgres:
    image: postgres:15-alpine
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      default:
        aliases: [postgres]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    hostname: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      default:
        aliases: [redis]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  linkforty:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGHOST: postgres
      PGPORT: "5432"
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://dashboard.example.com}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SHORTLINK_DOMAIN: ${SHORTLINK_DOMAIN:-}
    expose:
      - "3000"
    labels:
      - traefik.docker.network=coolify
    networks:
      - default
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "/app/docker-healthcheck.mjs"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
      start_interval: 5s

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      linkforty:
        condition: service_started
    environment:
      CORE_URL: ${CORE_URL:-http://linkforty:3000}
      SHORTLINK_BASE_URL: ${SHORTLINK_BASE_URL:-}
      CORE_API_TOKEN: ${CORE_API_TOKEN:-}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_URL: ${AUTH_URL:-http://localhost:3001}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      ADMIN_PASSWORD_HASH_B64: ${ADMIN_PASSWORD_HASH_B64:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      OPERATOR_USER_ID: ${OPERATOR_USER_ID:?OPERATOR_USER_ID is required}
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
    expose:
      - "3001"
    labels:
      - traefik.docker.network=coolify
    networks:
      - default
      - coolify
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data_v2:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    driver: bridge
  # MUST stay literal name `coolify` (Coolify Traefik net). Never ${COOLIFY_NETWORK}.
  coolify:
    name: coolify
    external: true
