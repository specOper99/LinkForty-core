# Single Coolify resource: Postgres + Redis + Core + Dashboard.
# All four share the default project network → CORE_URL=http://linkforty:3000.
#
# Coolify UI:
#   Resource type: Docker Compose
#   Compose file: docker-compose.coolify.yml
#   Domains:
#     linkforty  → https://links.example.com:3000
#     dashboard  → https://dashboard.example.com:3001
#   AUTH_URL = https://dashboard.example.com  (no :3001)
#   SHORTLINK_BASE_URL = https://links.example.com
#   POSTGRES_PASSWORD: alphanumeric only (Compose interpolates DATABASE_URL)
#   ADMIN_PASSWORD_HASH_B64: base64(bcrypt) — not raw $2b$… (see COOLIFY.md)
#   Secrets + NODE_ENV: Runtime only in Coolify UI (uncheck Available at Buildtime)
#
# See COOLIFY.md for setup.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-linkforty}
      POSTGRES_USER: ${POSTGRES_USER:-linkforty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-linkforty}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  linkforty:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-linkforty}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-linkforty}?sslmode=disable
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://dashboard.example.com}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SHORTLINK_DOMAIN: ${SHORTLINK_DOMAIN:-}
    expose:
      - "3000"
    labels:
      - traefik.docker.network=coolify
    networks:
      - default
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "/app/docker-healthcheck.mjs"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
      start_interval: 5s

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      # service_started — Coolify often marks linkforty "unhealthy" in <1s
      # (UI HC override / ignored start_period) while migrate is still running.
      # Crash still surfaces as "exited (N)".
      linkforty:
        condition: service_started
    environment:
      CORE_URL: ${CORE_URL:-http://linkforty:3000}
      SHORTLINK_BASE_URL: ${SHORTLINK_BASE_URL:-}
      CORE_API_TOKEN: ${CORE_API_TOKEN:-}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_URL: ${AUTH_URL:-http://localhost:3001}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      # Prefer B64 — bcrypt `$` breaks Compose/Coolify env + build-args.
      ADMIN_PASSWORD_HASH_B64: ${ADMIN_PASSWORD_HASH_B64:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      OPERATOR_USER_ID: ${OPERATOR_USER_ID:?OPERATOR_USER_ID is required}
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
    expose:
      - "3001"
    labels:
      - traefik.docker.network=coolify
    networks:
      - default
      - coolify
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  coolify:
    external: true
