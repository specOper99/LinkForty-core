# Production self-host (no Coolify): Postgres + Redis + Core + Dashboard
#
# Apps bind 127.0.0.1 only — put Caddy on host for :80/:443 TLS.
# See deploy/selfhost/bootstrap.sh (writes Caddyfile.generated + .env).
#
#   cp deploy/selfhost/env.example .env
#   # fill secrets + real domains
#   docker compose -f docker-compose.selfhost.yml up --build -d
#
# Health: curl -sfS http://127.0.0.1:3000/api/sdk/v1/health

services:
  postgres:
    image: postgres:15-alpine
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      default:
        aliases: [postgres]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Avoid read_only/cap_drop — postgres alpine + healthcheck need normal runtime
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    hostname: redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --protected-mode
      - "yes"
      - --bind
      - "0.0.0.0"
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      default:
        aliases: [redis]
    # Password interpolated at compose parse — reliable with requirepass
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Do not use read_only/cap_drop here — Redis AOF + alpine need a writable /data + normal caps
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  linkforty:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGHOST: postgres
      PGPORT: "5432"
      DATABASE_SSL: "false"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SHORTLINK_DOMAIN: ${SHORTLINK_DOMAIN:-}
      SHORTLINK_BASE_URL: ${SHORTLINK_BASE_URL:-}
      # Optional — iOS Universal Links / Android App Links (.well-known)
      IOS_TEAM_ID: ${IOS_TEAM_ID:-}
      IOS_BUNDLE_ID: ${IOS_BUNDLE_ID:-}
      ANDROID_PACKAGE_NAME: ${ANDROID_PACKAGE_NAME:-}
      ANDROID_SHA256_FINGERPRINTS: ${ANDROID_SHA256_FINGERPRINTS:-}
    # Host-only — never publish to 0.0.0.0 (Caddy terminates TLS)
    ports:
      - "127.0.0.1:${LINKFORTY_PORT:-3000}:3000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "/app/docker-healthcheck.mjs"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
      start_interval: 5s

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into Next serverActions.allowedOrigins — must match public host
        AUTH_URL: ${AUTH_URL:?AUTH_URL is required}
        SERVER_ACTIONS_ORIGINS: ${SERVER_ACTIONS_ORIGINS:-}
    depends_on:
      linkforty:
        condition: service_started
    environment:
      CORE_URL: ${CORE_URL:-http://linkforty:3000}
      SHORTLINK_BASE_URL: ${SHORTLINK_BASE_URL:?SHORTLINK_BASE_URL is required}
      CORE_API_TOKEN: ${CORE_API_TOKEN:-}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_URL: ${AUTH_URL:?AUTH_URL is required}
      AUTH_TRUST_HOST: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      ADMIN_PASSWORD_HASH_B64: ${ADMIN_PASSWORD_HASH_B64:?ADMIN_PASSWORD_HASH_B64 is required}
      # Never set ADMIN_PASSWORD in production
      ADMIN_PASSWORD_HASH: ""
      ADMIN_PASSWORD: ""
      OPERATOR_USER_ID: ${OPERATOR_USER_ID:?OPERATOR_USER_ID is required}
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-3001}:3001"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data_v2:
    driver: local
  redis_data:
    driver: local
